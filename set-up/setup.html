<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./setup.css" />
    <link rel="Icon" type="images" href="https://cdn-icons-png.flaticon.com/512/3339/3339164.png">
    <title>Charades Set-up</title>
  </head>
  <body>
    <main>
      <div class="" style="margin-bottom: 25px">
        <h1>Set-up</h1>
      </div>

      <div class="" id="team1Block" style="margin-bottom: 50px">
        <label for="" style="font-size: 25px;">Team 1</label>
        <input type="text" style="font-size: 20px; width: 150px;" id="team1" placeholder="Team 1 Name" />
        <button id="team1btn" style="font-size: 20px;">Submit</button>
        <div id="team1BlockDisplay"></div>
      </div>

      <div class="" id="team2Block" style="margin-bottom: 50px">
        <label for="" style="font-size: 25px;">Team 2</label>
        <input type="text" style="font-size: 20px; width: 150px;" id="team2" placeholder="Team 2 Name" />
        <button id="team2btn" style="font-size: 20px;">Submit</button>
        <div id="team2BlockDisplay"></div>
      </div>

      <div class="" id="timerBlock" style="margin-bottom: 50px">
        <p for="" style="font-size: 25px;">Choose time (in seconds):</p>
        <input
          id="timer"
          type="number"
          value="30"
          max="300"
          step="1"
          style="width: 50px; font-size: 20px;"
        />
        <button id="timerBtn" style="font-size: 20px;">Submit</button>
        <div id="timerBlockDisplay"></div>
      </div>

      <div class="" id="roundBlock" style="margin-bottom: 25px">
        <label for="" style="font-size: 25px;">Number of Rounds:</label>
        <input
          id="round"
          type="number"
          value="3"
          max="5"
          step="1"
          style="width: 50px; font-size: 20px;"
        />
        <button id="roundBtn" style="font-size: 20px;">Submit</button>
        <div id="roundBlockDisplay"></div>
      </div>

      <div class="" style="margin-bottom: 25px">
        <label for="" style="font-size: 25px;">Extra words:</p>
        <textarea
          id="extra-words"
          rows="5"
          cols="35"
          placeholder="Any additional words here"
          style="width: 300px; font-size: 20px;"
        ></textarea>
      </div>

      <div class="">
        <a href="../game/game.html">
          <button id="gameStart">Time to Start</button>
        </a>
      </div>
    </main>

    <script src="./setup.js"></script>
  </body>
</html>
