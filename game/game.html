<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./game.css">
    <title>Gametime</title>
</head>
<body>
    <main>
        <div class="title">
            <h1>GameTime</h1>
        </div>
    </main>
    
    <script>
        const team1 = localStorage.getItem("team1");
        const team2 = localStorage.getItem("team2");

        if (team1) {
            document.getElementById("temp").textContent = team1;
        } else {
            localStorage.setItem(team1, 't1')
        }
        
        if (team2) {
            document.getElementById("temp").textContent = team1;
        } else {
            localStorage.setItem(team2, 't2')
        }
    </script>
</body>
</html>
